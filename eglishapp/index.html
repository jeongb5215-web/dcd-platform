
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<meta name="theme-color" content="#ffffff">
<title>영어 단어장</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── 다크모드 완전 차단 ── */
  :root { color-scheme: light only !important; }
  html, body {
    background: #ffffff !important;
    background-color: #ffffff !important;
    color: #1a1a1a !important;
    filter: none !important;
    -webkit-filter: none !important;
  }
  @media (prefers-color-scheme: dark) {
    * { filter: none !important; -webkit-filter: none !important; }
    html, body, main, header,
    .deck-card, .deck-body, .deck-footer,
    .modal, .modal-overlay, .flashcard,
    .practice-screen, .practice-header, .practice-content,
    .word-item, .add-word-row input, input, textarea {
      background: #ffffff !important;
      background-color: #ffffff !important;
      color: #1a1a1a !important;
    }
    header, .practice-header { background: #5b2d8e !important; color: #ffffff !important; }
    .btn-primary { background: #5b2d8e !important; color: #ffffff !important; }
  }

  :root {
    --purple: #5b2d8e;
    --purple-light: #7c3fb5;
    --purple-border: #6b3fa0;
    --green: #4caf50;
    --bg: #ffffff;
    --card-bg: #ffffff;
    --text: #1a1a1a;
    --text-sub: #666;
    --gray-bar: #e0e0e0;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--purple);
    color: #fff;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
  }
  header h1 { font-size: 1.2rem; font-weight: 700; }
  .btn-icon {
    background: rgba(255,255,255,.2);
    border: none;
    color: #fff;
    width: 36px; height: 36px;
    border-radius: 50%;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s;
  }
  .btn-icon:hover { background: rgba(255,255,255,.35); }

  main { max-width: 520px; margin: 0 auto; padding: 20px 16px 80px; }

  .section-label {
    font-size: .75rem;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--text-sub);
    letter-spacing: 1px;
    margin-bottom: 12px;
    padding-left: 2px;
  }

  .deck-list { display: flex; flex-direction: column; gap: 12px; }

  .deck-card {
    background: var(--card-bg);
    border-radius: 14px;
    border: 2px solid var(--purple-border);
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(91,45,142,.08);
    transition: transform .15s, box-shadow .15s;
  }
  .deck-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(91,45,142,.15); }

  .deck-body { padding: 16px 18px 6px; }
  .deck-title { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
  .deck-meta { font-size: .82rem; color: var(--text-sub); margin-bottom: 10px; }

  .progress-bar-wrap {
    height: 8px;
    background: var(--gray-bar);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--green);
    border-radius: 4px;
    transition: width .4s ease;
  }

  .deck-footer {
    border-top: 1px solid #f0f0f0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 18px;
  }
  .btn-practice {
    background: none;
    border: none;
    color: var(--text-sub);
    font-size: .9rem;
    cursor: pointer;
    display: flex; align-items: center; gap: 4px;
    transition: color .2s;
    padding: 4px 0;
  }
  .btn-practice:hover { color: var(--purple); }

  .deck-actions { display: flex; gap: 6px; }
  .btn-small {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-sub);
    font-size: .85rem;
    padding: 4px 8px;
    border-radius: 6px;
    transition: background .2s, color .2s;
  }
  .btn-small:hover { background: #f0eaf8; color: var(--purple); }
  .btn-small.danger:hover { background: #fdecea; color: #d32f2f; }

  .fab {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--purple);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 56px; height: 56px;
    font-size: 1.6rem;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(91,45,142,.4);
    display: flex; align-items: center; justify-content: center;
    transition: background .2s, transform .15s;
    z-index: 200;
  }
  .fab:hover { background: var(--purple-light); transform: scale(1.08); }

  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 300;
    padding: 16px;
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: #fff;
    border-radius: 18px;
    width: 100%;
    max-width: 500px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 24px;
    transform: translateY(20px); transition: transform .2s;
    box-shadow: 0 8px 40px rgba(0,0,0,.2);
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .modal-title { font-size: 1.1rem; font-weight: 700; }
  .btn-close {
    background: none; border: none;
    font-size: 1.4rem; cursor: pointer;
    color: var(--text-sub); line-height: 1;
    padding: 2px 6px; border-radius: 6px;
  }
  .btn-close:hover { background: #f0f0f0; }

  label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: 5px; color: #444; }

  input[type="text"], textarea {
    width: 100%;
    border: 1.5px solid #ddd;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: .95rem;
    font-family: inherit;
    outline: none;
    transition: border-color .2s;
    color: var(--text);
  }
  input[type="text"]:focus, textarea:focus { border-color: var(--purple); }

  .form-group { margin-bottom: 16px; }

  .btn-primary {
    background: var(--purple);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px 24px;
    font-size: .95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s;
    width: 100%;
  }
  .btn-primary:hover { background: var(--purple-light); }

  .word-list { margin-bottom: 16px; max-height: 240px; overflow-y: auto; }
  .word-item {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 10px 12px;
    border: 1.5px solid #eee;
    border-radius: 10px;
    margin-bottom: 8px;
    background: #fafafa;
  }
  .word-item-text { flex: 1; min-width: 0; }
  .word-en { font-weight: 600; font-size: .95rem; }
  .word-ko { font-size: .85rem; color: var(--text-sub); margin-top: 2px; }
  .word-mastered-badge {
    font-size: .7rem;
    background: var(--green);
    color: #fff;
    padding: 2px 6px;
    border-radius: 10px;
    white-space: nowrap;
    align-self: center;
  }

  .add-word-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr auto;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }
  .translate-btn {
    background: var(--purple);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0 10px;
    font-size: .75rem;
    cursor: pointer;
    white-space: nowrap;
    transition: background .2s;
    height: 40px;
  }
  .translate-btn:hover { background: var(--purple-light); }
  .translate-btn.loading { opacity: .7; cursor: not-allowed; }
  .add-word-row input { height: 40px; padding: 8px 12px; }
  .btn-add-word {
    height: 40px;
    padding: 0 12px;
    background: none;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    cursor: pointer;
    font-size: .85rem;
    color: var(--text);
    transition: background .2s;
    white-space: nowrap;
  }
  .btn-add-word:hover { background: #f0eaf8; border-color: var(--purple); color: var(--purple); }

  .divider { border: none; border-top: 1.5px solid #eee; margin: 16px 0; }

  /* Practice Screen */
  .practice-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 400;
    display: flex; flex-direction: column;
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .practice-screen.open { opacity: 1; pointer-events: all; }

  .practice-header {
    background: var(--purple);
    color: #fff;
    padding: 16px 20px;
    display: flex; align-items: center; gap: 12px;
  }
  .practice-header h2 { font-size: 1rem; font-weight: 700; flex: 1; }
  .practice-progress { font-size: .85rem; opacity: .85; }

  .practice-content {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px;
  }

  .flashcard {
    width: 100%;
    max-width: 400px;
    min-height: 200px;
    background: #fff;
    border-radius: 20px;
    border: 2px solid var(--purple-border);
    box-shadow: 0 6px 24px rgba(91,45,142,.12);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px 24px;
    cursor: pointer;
    text-align: center;
    position: relative;
  }
  .flashcard::after {
    content: '탭하여 뜻 보기';
    position: absolute;
    bottom: 14px;
    font-size: .75rem;
    color: var(--text-sub);
  }
  .flashcard.revealed::after { display: none; }
  .flashcard:hover { box-shadow: 0 8px 32px rgba(91,45,142,.18); }

  .card-en { font-size: 1.6rem; font-weight: 700; color: var(--purple); margin-bottom: 4px; }
  .card-ko { font-size: 1.1rem; color: #333; display: none; margin-top: 12px; line-height: 1.5; }
  .flashcard.revealed .card-ko { display: block; }

  .card-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 400px;
    margin-bottom: 14px;
    gap: 8px;
  }
  .btn-nav {
    background: #fff;
    border: 1.5px solid var(--purple-border);
    color: var(--purple);
    border-radius: 20px;
    padding: 7px 18px;
    font-size: .85rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s;
    white-space: nowrap;
  }
  .btn-nav:hover:not(:disabled) { background: #f0eaf8; }
  .btn-nav:disabled { opacity: .3; cursor: default; }

  .card-nav-dots {
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--gray-bar);
    transition: background .2s;
  }
  .dot.active { background: var(--purple); transform: scale(1.3); }
  .dot.done { background: var(--green); }

  .btn-speak {
    background: #f0eaf8;
    color: var(--purple);
    border: none;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: .8rem;
    cursor: pointer;
    margin-top: 6px;
    transition: background .2s;
  }
  .btn-speak:hover { background: #e0d0f5; }

  .practice-actions {
    display: flex; gap: 12px;
    margin-top: 24px;
    width: 100%;
    max-width: 400px;
  }
  .btn-not-yet {
    flex: 1; padding: 14px;
    background: #fdecea; color: #c62828;
    border: none; border-radius: 12px;
    font-size: .95rem; font-weight: 700;
    cursor: pointer; transition: background .2s;
  }
  .btn-not-yet:hover { background: #ffcdd2; }
  .btn-mastered {
    flex: 1; padding: 14px;
    background: #e8f5e9; color: #2e7d32;
    border: none; border-radius: 12px;
    font-size: .95rem; font-weight: 700;
    cursor: pointer; transition: background .2s;
  }
  .btn-mastered:hover { background: #c8e6c9; }

  .practice-done {
    text-align: center;
    padding: 40px 24px;
  }
  .practice-done .big-emoji { font-size: 3.5rem; margin-bottom: 12px; }
  .practice-done h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; }
  .practice-done p { color: var(--text-sub); margin-bottom: 24px; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-sub);
  }
  .empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }
  .empty-state p { font-size: .95rem; line-height: 1.6; }

  .toast {
    position: fixed;
    bottom: 90px; left: 50%; transform: translateX(-50%) translateY(10px);
    background: #333; color: #fff;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: .85rem;
    z-index: 500;
    opacity: 0; transition: opacity .25s, transform .25s;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* 자동재생 버튼 */
  .btn-autoplay {
    background: rgba(255,255,255,.2);
    border: 1.5px solid rgba(255,255,255,.5);
    color: #fff;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: .82rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background .2s;
    display: flex; align-items: center; gap: 5px;
  }
  .btn-autoplay:hover { background: rgba(255,255,255,.35); }
  .btn-autoplay.on { background: #fff; color: var(--purple); border-color: #fff; }

  /* 자동재생 진행 바 */
  .autoplay-bar-wrap {
    width: 100%;
    max-width: 400px;
    height: 4px;
    background: var(--gray-bar);
    border-radius: 2px;
    margin-top: 14px;
    overflow: hidden;
    display: none;
  }
  .autoplay-bar-wrap.show { display: block; }
  .autoplay-bar-fill {
    height: 100%;
    background: var(--purple);
    border-radius: 2px;
    width: 0%;
    transition: width linear;
  }
</style>
</head>
<body>

<header>
  <h1>📚 영어 단어장</h1>
  <button class="btn-icon" title="검색" onclick="toggleSearch()">🔍</button>
</header>

<main>
  <div id="searchBox" style="display:none; margin-bottom:14px;">
    <input type="text" id="searchInput" placeholder="단어 검색..." oninput="renderDecks()">
  </div>
  <div class="section-label">내 단어장</div>
  <div class="deck-list" id="deckList"></div>
</main>

<button class="fab" onclick="openNewDeckModal()">+</button>

<!-- Deck Editor Modal -->
<div class="modal-overlay" id="deckModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="deckModalTitle">새 단어장</span>
      <button class="btn-close" onclick="closeModal('deckModal')">×</button>
    </div>

    <div class="form-group">
      <label>단어장 이름</label>
      <input type="text" id="deckNameInput" placeholder="예: TOEIC 필수 단어, 일상 숙어">
    </div>

    <hr class="divider">

    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
      <label style="margin-bottom:0;">단어 목록</label>
      <span id="wordCount" style="font-size:.8rem; color:var(--text-sub);">0개</span>
    </div>

    <div class="word-list" id="wordListUI"></div>

    <div class="add-word-row">
      <input type="text" id="newWordEn" placeholder="영어 단어/숙어" onkeydown="if(event.key==='Enter')addWordToList()">
      <button class="translate-btn" id="transBtn" onclick="autoTranslate()">🔄 번역</button>
      <input type="text" id="newWordKo" placeholder="한국어 뜻" onkeydown="if(event.key==='Enter')addWordToList()">
      <button class="btn-add-word" onclick="addWordToList()">추가</button>
    </div>
    <div style="font-size:.75rem; color:var(--text-sub); margin-bottom:16px; padding-left:2px;">
      Enter 또는 추가 버튼으로 등록 · 🔄 버튼으로 자동 번역
    </div>

    <button class="btn-primary" onclick="saveDeck()">저장하기</button>
  </div>
</div>

<!-- Practice Screen -->
<div class="practice-screen" id="practiceScreen">
  <div class="practice-header">
    <button class="btn-icon" onclick="closePractice()">←</button>
    <h2 id="practiceTitle"></h2>
    <button class="btn-autoplay" id="btnAutoPlay" onclick="toggleAutoPlay()">▶ 자동재생</button>
    <span class="practice-progress" id="practiceProgress"></span>
  </div>
  <div class="practice-content" id="practiceContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'vocabDecks_v1';

function loadDecks() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function saveDecks(decks) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(decks));
}
function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let decks = loadDecks();

// ── Deck List ──────────────────────────────────────────────
function renderDecks() {
  const list = document.getElementById('deckList');
  const q = (document.getElementById('searchInput')?.value || '').toLowerCase().trim();

  let filtered = decks;
  if (q) {
    filtered = decks.map(d => ({
      ...d,
      words: d.words.filter(w => w.en.toLowerCase().includes(q) || w.ko.toLowerCase().includes(q))
    })).filter(d => d.words.length > 0 || d.name.toLowerCase().includes(q));
  }

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <div class="emoji">📖</div>
      <p>${q ? '검색 결과가 없습니다.' : '단어장이 없습니다.<br>아래 + 버튼으로 첫 단어장을 만들어보세요!'}</p>
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(deck => {
    const total = deck.words.length;
    const mastered = deck.words.filter(w => w.mastered).length;
    const pct = total ? Math.round((mastered / total) * 100) : 0;
    return `
    <div class="deck-card">
      <div class="deck-body">
        <div class="deck-title">${escHtml(deck.name)}</div>
        <div class="deck-meta">${mastered} of ${total} cards mastered</div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" style="width:${pct}%"></div>
        </div>
      </div>
      <div class="deck-footer">
        <button class="btn-practice" onclick="startPractice('${deck.id}')">
          Practice this deck →
        </button>
        <div class="deck-actions">
          <button class="btn-small" onclick="openEditDeckModal('${deck.id}')">✏️ 편집</button>
          <button class="btn-small danger" onclick="deleteDeck('${deck.id}')">🗑️</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Search ─────────────────────────────────────────────────
function toggleSearch() {
  const box = document.getElementById('searchBox');
  const open = box.style.display !== 'none';
  box.style.display = open ? 'none' : 'block';
  if (!open) document.getElementById('searchInput').focus();
  else { document.getElementById('searchInput').value = ''; renderDecks(); }
}

// ── Modal ──────────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.getElementById('deckModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal('deckModal');
});

// ── Deck Editor ────────────────────────────────────────────
let editingDeckId = null;
let pendingWords = [];

function openNewDeckModal() {
  editingDeckId = null;
  pendingWords = [];
  document.getElementById('deckNameInput').value = '';
  document.getElementById('newWordEn').value = '';
  document.getElementById('newWordKo').value = '';
  document.getElementById('deckModalTitle').textContent = '새 단어장';
  renderWordListUI();
  openModal('deckModal');
  setTimeout(() => document.getElementById('deckNameInput').focus(), 150);
}

function openEditDeckModal(deckId) {
  const deck = decks.find(d => d.id === deckId);
  if (!deck) return;
  editingDeckId = deckId;
  pendingWords = deck.words.map(w => ({ ...w }));
  document.getElementById('deckNameInput').value = deck.name;
  document.getElementById('newWordEn').value = '';
  document.getElementById('newWordKo').value = '';
  document.getElementById('deckModalTitle').textContent = '단어장 편집';
  renderWordListUI();
  openModal('deckModal');
}

function renderWordListUI() {
  const ul = document.getElementById('wordListUI');
  document.getElementById('wordCount').textContent = pendingWords.length + '개';
  if (pendingWords.length === 0) {
    ul.innerHTML = '<div style="text-align:center;color:#bbb;padding:12px;font-size:.85rem;">아직 단어가 없습니다</div>';
    return;
  }
  ul.innerHTML = pendingWords.map((w, i) => `
    <div class="word-item">
      <div class="word-item-text">
        <div class="word-en">${escHtml(w.en)}</div>
        <div class="word-ko">${escHtml(w.ko)}</div>
      </div>

function removeWord(idx) {
  pendingWords.splice(idx, 1);
  renderWordListUI();
}

function addWordToList() {
  const en = document.getElementById('newWordEn').value.trim();
  const ko = document.getElementById('newWordKo').value.trim();
  if (!en) { showToast('영어 단어를 입력하세요'); document.getElementById('newWordEn').focus(); return; }
  if (!ko) { showToast('한국어 뜻을 입력하세요'); document.getElementById('newWordKo').focus(); return; }
  pendingWords.push({ id: genId(), en, ko, mastered: false });
  document.getElementById('newWordEn').value = '';
  document.getElementById('newWordKo').value = '';
  renderWordListUI();
  document.getElementById('newWordEn').focus();
}

// ── Auto Translate (MyMemory API) ──────────────────────────
async function autoTranslate() {
  const en = document.getElementById('newWordEn').value.trim();
  if (!en) { showToast('번역할 영어를 먼저 입력하세요'); return; }
  const btn = document.getElementById('transBtn');
  btn.classList.add('loading');
  btn.textContent = '번역 중...';
  try {
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(en)}&langpair=en|ko`;
    const resp = await fetch(url);
    const data = await resp.json();
    if (data.responseStatus === 200) {
      document.getElementById('newWordKo').value = data.responseData.translatedText;
      document.getElementById('newWordKo').focus();
    } else {
      showToast('번역 실패. 직접 입력해주세요.');
    }
  } catch {
    showToast('번역 서버에 연결할 수 없습니다.');
  } finally {
    btn.classList.remove('loading');
    btn.textContent = '🔄 번역';
  }
}

// ── Save Deck ──────────────────────────────────────────────
function saveDeck() {
  const name = document.getElementById('deckNameInput').value.trim();
  if (!name) { showToast('단어장 이름을 입력하세요'); return; }

  // auto-add any filled word in input fields
  const en = document.getElementById('newWordEn').value.trim();
  const ko = document.getElementById('newWordKo').value.trim();
  if (en && ko) pendingWords.push({ id: genId(), en, ko, mastered: false });

  if (editingDeckId) {
    const idx = decks.findIndex(d => d.id === editingDeckId);
    if (idx !== -1) { decks[idx].name = name; decks[idx].words = pendingWords; }
  } else {
    decks.push({ id: genId(), name, words: pendingWords, createdAt: Date.now() });
  }
  saveDecks(decks);
  renderDecks();
  closeModal('deckModal');
  showToast(editingDeckId ? '단어장이 수정되었습니다' : '단어장이 저장되었습니다 ✓');
}

// ── Delete Deck ────────────────────────────────────────────
function deleteDeck(deckId) {
  if (!confirm('이 단어장을 삭제하시겠습니까?')) return;
  decks = decks.filter(d => d.id !== deckId);
  saveDecks(decks);
  renderDecks();
  showToast('삭제되었습니다');
}

// ── Practice Mode ──────────────────────────────────────────
let practiceState = {};

function startPractice(deckId) {
  const deck = decks.find(d => d.id === deckId);
  if (!deck || deck.words.length === 0) { showToast('단어를 먼저 추가하세요'); return; }
  const queue = [...deck.words].sort(() => Math.random() - .5);
  practiceState = { deckId, queue, idx: 0 };
  document.getElementById('practiceTitle').textContent = deck.name;
  document.getElementById('practiceScreen').classList.add('open');
  renderCard();
}

function renderCard() {
  const { queue, idx } = practiceState;
  const content = document.getElementById('practiceContent');
  document.getElementById('practiceProgress').textContent = `${Math.min(idx + 1, queue.length)} / ${queue.length}`;

  if (idx >= queue.length) {
    const mastered = queue.filter(w => w.mastered).length;
    content.innerHTML = `
      <div class="practice-done">
        <div class="big-emoji">🎉</div>
        <h2>연습 완료!</h2>
        <p>${queue.length}개 단어 중 <strong>${mastered}개</strong>를 암기했습니다</p>
        <button class="btn-primary" style="max-width:200px;margin:0 auto;" onclick="closePractice()">완료</button>
      </div>`;
    return;
  }

  const word = queue[idx];
  const hasPrev = idx > 0;
  content.innerHTML = `
    <div class="card-nav">
      <button class="btn-nav" ${hasPrev ? '' : 'disabled'} onclick="goCard(-1)">← 이전</button>
      <span class="card-nav-dots">${queue.map((_, i) => `<span class="dot ${i === idx ? 'active' : i < idx ? 'done' : ''}"></span>`).slice(Math.max(0, idx-3), idx+4).join('')}</span>
      <button class="btn-nav" onclick="goCard(1)">다음 →</button>
    </div>
    <div class="flashcard" id="flashcard" onclick="revealCard()">
      <div class="card-en">${escHtml(word.en)}</div>
      <button class="btn-speak" onclick="event.stopPropagation();speak('${escHtml(word.en).replace(/'/g,"\\'")}')">🔊 발음 듣기</button>
      <div class="card-ko">${escHtml(word.ko)}</div>
    </div>
    <div class="practice-actions" id="practiceActions" style="display:none;">
      <button class="btn-not-yet" onclick="markWord(false)">😅 아직</button>
      <button class="btn-mastered" onclick="markWord(true)">✅ 암기!</button>
    </div>`;
}

function goCard(dir) {
  stopAutoPlay();
  const { queue, idx } = practiceState;
  const next = idx + dir;
  if (next < 0 || next > queue.length) return;
  practiceState.idx = next;
  renderCard();
  if (next < queue.length) speak(queue[next].en);
}

function revealCard() {
  document.getElementById('flashcard')?.classList.add('revealed');
  const actions = document.getElementById('practiceActions');
  if (actions) actions.style.display = 'flex';
}

function markWord(mastered) {
  stopAutoPlay();
  const { queue, idx, deckId } = practiceState;
  queue[idx].mastered = mastered;
  const deck = decks.find(d => d.id === deckId);
  if (deck) {
    const word = deck.words.find(w => w.id === queue[idx].id);
    if (word) word.mastered = mastered;
    saveDecks(decks);
  }
  practiceState.idx = idx + 1;
  renderCard();
  const next = practiceState.idx;
  if (next < practiceState.queue.length) speak(practiceState.queue[next].en);
}

function closePractice() {
  stopAutoPlay();
  document.getElementById('practiceScreen').classList.remove('open');
  renderDecks();
}

// ── Auto Play ──────────────────────────────────────────────
const AP = { running: false, timer: null };

function toggleAutoPlay() {
  AP.running ? stopAutoPlay() : startAutoPlay();
}

function startAutoPlay() {
  AP.running = true;
  const btn = document.getElementById('btnAutoPlay');
  if (btn) { btn.textContent = '⏹ 정지'; btn.classList.add('on'); }
  runAutoStep();
}

function stopAutoPlay() {
  AP.running = false;
  clearTimeout(AP.timer);
  silenceAudio();
  const btn = document.getElementById('btnAutoPlay');
  if (btn) { btn.textContent = '▶ 자동재생'; btn.classList.remove('on'); }
}

// 오디오를 잡음 없이 완전히 정지
function silenceAudio() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  if (currentAudio) {
    currentAudio.onended = null;   // 콜백 제거 — ghost callback 방지
    currentAudio.onerror = null;
    if (!currentAudio.ended) currentAudio.pause();
    currentAudio = null;
  }
}

// 괄호/부연설명 제거하여 TTS 잡음 방지
function cleanTTS(text) {
  return text
    .replace(/\([^)]*\)/g, '')  // (괄호 내용) 제거
    .replace(/\[[^\]]*\]/g, '') // [대괄호 내용] 제거
    .replace(/\s+/g, ' ')
    .trim();
}

function runAutoStep() {
  if (!AP.running) return;
  const { queue, idx } = practiceState;
  if (idx >= queue.length) { stopAutoPlay(); return; }

  const word = queue[idx];

  // 1단계: 영어 읽기
  speakWithCb(word.en, 'en', () => {
    if (!AP.running) return;
    // 2단계: 1초 후 카드 뒤집기 (한국어 TTS 없음)
    AP.timer = setTimeout(() => {
      if (!AP.running) return;
      revealCard();
      // 3단계: 2초 후 다음 카드
      AP.timer = setTimeout(() => {
        if (!AP.running) return;
        practiceState.idx = idx + 1;
        renderCard();
        runAutoStep();
      }, 2000);
    }, 1000);
  });
}

// 콜백 있는 TTS (자동재생 전용)
function speakWithCb(text, lang, cb) {
  const tl = lang === 'ko' ? 'ko' : 'en-US';

  // 이전 오디오 잡음 없이 정지
  silenceAudio();

  if (isMobile) {
    // 모바일: 50ms 후 새 오디오 시작 (직전 정지와 겹침 방지)
    AP.timer = setTimeout(() => {
      const url = 'https://translate.google.com/translate_tts'
        + '?ie=UTF-8&tl=' + tl + '&client=tw-ob&q=' + encodeURIComponent(text);
      currentAudio = new Audio(url);
      currentAudio.onended = cb;
      currentAudio.onerror = () => { currentAudio = null; cb(); };
      currentAudio.play().catch(() => { currentAudio = null; cb(); });
    }, 50);
    return;
  }

  // PC: Web Speech API
  if (!window.speechSynthesis) { cb(); return; }
  setTimeout(() => {
    if (!AP.running && lang !== 'en') return; // 정지됐으면 한국어 건너뜀
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang    = lang === 'ko' ? 'ko-KR' : 'en-US';
    utter.rate    = 0.85;
    utter.volume  = 1;
    if (lang === 'en' && cachedVoices.length) {
      const v = cachedVoices.find(v => v.lang === 'en-US')
             || cachedVoices.find(v => v.lang.startsWith('en'));
      if (v) utter.voice = v;
    }
    utter.onend   = cb;
    utter.onerror = cb;
    window.speechSynthesis.speak(utter);
  }, 80);
}

// ── Text-to-Speech ─────────────────────────────────────────
const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);

// PC용 Web Speech API 음성 캐시
let cachedVoices = [];
if (window.speechSynthesis) {
  const loadV = () => { cachedVoices = window.speechSynthesis.getVoices(); };
  window.speechSynthesis.addEventListener('voiceschanged', loadV);
  loadV();
}

// Google TTS Audio — 모바일 전용 (click 핸들러에서 직접 호출해야 autoplay 허용)
let currentAudio = null;
function speakAudio(text) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  const url = 'https://translate.google.com/translate_tts'
    + '?ie=UTF-8&tl=en-US&client=tw-ob&q=' + encodeURIComponent(text);
  currentAudio = new Audio(url);
  currentAudio.play().catch(() => {
    // Google TTS 차단 시 Web Speech API 재시도
    if (window.speechSynthesis) speakWebAPI(text);
  });
}

// Web Speech API — PC 기본, 모바일 폴백
function speakWebAPI(text) {
  if (!window.speechSynthesis) return;
  const fire = () => {
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang   = 'en-US';
    utter.rate   = 0.85;
    utter.volume = 1;
    if (!isMobile && cachedVoices.length) {
      const v = cachedVoices.find(v => v.lang === 'en-US')
             || cachedVoices.find(v => v.lang.startsWith('en'));
      if (v) utter.voice = v;
    }
    window.speechSynthesis.speak(utter);
  };
  if (window.speechSynthesis.speaking || window.speechSynthesis.pending) {
    window.speechSynthesis.cancel();
    setTimeout(fire, 60);
  } else {
    fire();
  }
}

function speak(text) {
  if (isMobile) {
    // 모바일: Google TTS Audio 직접 호출 (click 핸들러 컨텍스트 유지)
    speakAudio(text);
  } else {
    // PC: Web Speech API
    speakWebAPI(text);
  }
}

function seedDefaultDecks() {
  const DECK_NAME = 'Counter-UAS 드론 전문 용어';
  const TOEIC_NAME = '토익 1200 단어';
  const newWords = ALL_DEFAULT_WORDS.map(([en, ko]) => ({ id: genId(), en, ko, mastered: false }));

  // 구버전(두 개로 분리된) 단어장 병합
  const old1 = decks.findIndex(d => d.name === DECK_NAME + ' (1)');
  const old2 = decks.findIndex(d => d.name === DECK_NAME + ' (2)');
  if (old1 !== -1 && old2 !== -1) {
    decks.splice(Math.max(old1, old2), 1);
    decks.splice(Math.min(old1, old2), 1);
  }

  // Counter-UAS 단어장 버전 확인 — 구버전이면 단어 교체
  const existing = decks.findIndex(d => d.name === DECK_NAME);
  if (existing === -1) {
    decks.unshift({ id: genId(), name: DECK_NAME, version: DECK_VERSION, createdAt: Date.now(), words: newWords });
  } else if ((decks[existing].version || 1) < DECK_VERSION) {
    const masteredSet = new Set(decks[existing].words.filter(w => w.mastered).map(w => w.en));
    decks[existing].words = newWords.map(w => ({ ...w, mastered: masteredSet.has(w.en) }));
    decks[existing].version = DECK_VERSION;
  }

  // 토익 단어장 — 없거나 단어 수가 부족하면 업데이트
  const toeicIdx = decks.findIndex(d => d.name === TOEIC_NAME);
  const toeicWords = TOEIC_WORDS_1.map(([en, ko]) => ({ id: genId(), en, ko, mastered: false }));
  if (toeicIdx === -1) {
    decks.push({ id: genId(), name: TOEIC_NAME, version: 1, createdAt: Date.now(), words: toeicWords });
  } else if (decks[toeicIdx].words.length < TOEIC_WORDS_1.length) {
    const masteredSet = new Set(decks[toeicIdx].words.filter(w => w.mastered).map(w => w.en));
    decks[toeicIdx].words = toeicWords.map(w => ({ ...w, mastered: masteredSet.has(w.en) }));
    decks[toeicIdx].version = 1;
  }

  saveDecks(decks);
}
