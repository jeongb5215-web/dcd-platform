
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<meta name="theme-color" content="#ffffff">
<title>영어 단어장</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── 다크모드 완전 차단 ── */
  :root { color-scheme: light only !important; }
  html, body {
    background: #ffffff !important;
    background-color: #ffffff !important;
    color: #1a1a1a !important;
    filter: none !important;
    -webkit-filter: none !important;
  }
  @media (prefers-color-scheme: dark) {
    * { filter: none !important; -webkit-filter: none !important; }
    html, body, main, header,
    .deck-card, .deck-body, .deck-footer,
    .modal, .modal-overlay, .flashcard,
    .practice-screen, .practice-header, .practice-content,
    .word-item, .add-word-row input, input, textarea {
      background: #ffffff !important;
      background-color: #ffffff !important;
      color: #1a1a1a !important;
    }
    header, .practice-header { background: #5b2d8e !important; color: #ffffff !important; }
    .btn-primary { background: #5b2d8e !important; color: #ffffff !important; }
  }

  :root {
    --purple: #5b2d8e;
    --purple-light: #7c3fb5;
    --purple-border: #6b3fa0;
    --green: #4caf50;
    --bg: #ffffff;
    --card-bg: #ffffff;
    --text: #1a1a1a;
    --text-sub: #666;
    --gray-bar: #e0e0e0;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--purple);
    color: #fff;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
  }
  header h1 { font-size: 1.2rem; font-weight: 700; }
  .btn-icon {
    background: rgba(255,255,255,.2);
    border: none;
    color: #fff;
    width: 36px; height: 36px;
    border-radius: 50%;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s;
  }
  .btn-icon:hover { background: rgba(255,255,255,.35); }

  main { max-width: 520px; margin: 0 auto; padding: 20px 16px 80px; }

  .section-label {
    font-size: .75rem;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--text-sub);
    letter-spacing: 1px;
    margin-bottom: 12px;
    padding-left: 2px;
  }

  .deck-list { display: flex; flex-direction: column; gap: 12px; }

  .deck-card {
    background: var(--card-bg);
    border-radius: 14px;
    border: 2px solid var(--purple-border);
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(91,45,142,.08);
    transition: transform .15s, box-shadow .15s;
  }
  .deck-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(91,45,142,.15); }

  .deck-body { padding: 16px 18px 6px; }
  .deck-title { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
  .deck-meta { font-size: .82rem; color: var(--text-sub); margin-bottom: 10px; }

  .progress-bar-wrap {
    height: 8px;
    background: var(--gray-bar);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--green);
    border-radius: 4px;
    transition: width .4s ease;
  }

  .deck-footer {
    border-top: 1px solid #f0f0f0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 18px;
  }
  .btn-practice {
    background: none;
    border: none;
    color: var(--text-sub);
    font-size: .9rem;
    cursor: pointer;
    display: flex; align-items: center; gap: 4px;
    transition: color .2s;
    padding: 4px 0;
  }
  .btn-practice:hover { color: var(--purple); }

  .deck-actions { display: flex; gap: 6px; }
  .btn-small {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-sub);
    font-size: .85rem;
    padding: 4px 8px;
    border-radius: 6px;
    transition: background .2s, color .2s;
  }
  .btn-small:hover { background: #f0eaf8; color: var(--purple); }
  .btn-small.danger:hover { background: #fdecea; color: #d32f2f; }

  .fab {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--purple);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 56px; height: 56px;
    font-size: 1.6rem;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(91,45,142,.4);
    display: flex; align-items: center; justify-content: center;
    transition: background .2s, transform .15s;
    z-index: 200;
  }
  .fab:hover { background: var(--purple-light); transform: scale(1.08); }

  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 300;
    padding: 16px;
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: #fff;
    border-radius: 18px;
    width: 100%;
    max-width: 500px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 24px;
    transform: translateY(20px); transition: transform .2s;
    box-shadow: 0 8px 40px rgba(0,0,0,.2);
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .modal-title { font-size: 1.1rem; font-weight: 700; }
  .btn-close {
    background: none; border: none;
    font-size: 1.4rem; cursor: pointer;
    color: var(--text-sub); line-height: 1;
    padding: 2px 6px; border-radius: 6px;
  }
  .btn-close:hover { background: #f0f0f0; }

  label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: 5px; color: #444; }

  input[type="text"], textarea {
    width: 100%;
    border: 1.5px solid #ddd;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: .95rem;
    font-family: inherit;
    outline: none;
    transition: border-color .2s;
    color: var(--text);
  }
  input[type="text"]:focus, textarea:focus { border-color: var(--purple); }

  .form-group { margin-bottom: 16px; }

  .btn-primary {
    background: var(--purple);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px 24px;
    font-size: .95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s;
    width: 100%;
  }
  .btn-primary:hover { background: var(--purple-light); }

  .word-list { margin-bottom: 16px; max-height: 240px; overflow-y: auto; }
  .word-item {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 10px 12px;
    border: 1.5px solid #eee;
    border-radius: 10px;
    margin-bottom: 8px;
    background: #fafafa;
  }
  .word-item-text { flex: 1; min-width: 0; }
  .word-en { font-weight: 600; font-size: .95rem; }
  .word-ko { font-size: .85rem; color: var(--text-sub); margin-top: 2px; }
  .word-mastered-badge {
    font-size: .7rem;
    background: var(--green);
    color: #fff;
    padding: 2px 6px;
    border-radius: 10px;
    white-space: nowrap;
    align-self: center;
  }

  .add-word-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr auto;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }
  .translate-btn {
    background: var(--purple);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0 10px;
    font-size: .75rem;
    cursor: pointer;
    white-space: nowrap;
    transition: background .2s;
    height: 40px;
  }
  .translate-btn:hover { background: var(--purple-light); }
  .translate-btn.loading { opacity: .7; cursor: not-allowed; }
  .add-word-row input { height: 40px; padding: 8px 12px; }
  .btn-add-word {
    height: 40px;
    padding: 0 12px;
    background: none;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    cursor: pointer;
    font-size: .85rem;
    color: var(--text);
    transition: background .2s;
    white-space: nowrap;
  }
  .btn-add-word:hover { background: #f0eaf8; border-color: var(--purple); color: var(--purple); }

  .divider { border: none; border-top: 1.5px solid #eee; margin: 16px 0; }

  /* Practice Screen */
  .practice-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 400;
    display: flex; flex-direction: column;
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .practice-screen.open { opacity: 1; pointer-events: all; }

  .practice-header {
    background: var(--purple);
    color: #fff;
    padding: 16px 20px;
    display: flex; align-items: center; gap: 12px;
  }
  .practice-header h2 { font-size: 1rem; font-weight: 700; flex: 1; }
  .practice-progress { font-size: .85rem; opacity: .85; }

  .practice-content {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px;
  }

  .flashcard {
    width: 100%;
    max-width: 400px;
    min-height: 200px;
    background: #fff;
    border-radius: 20px;
    border: 2px solid var(--purple-border);
    box-shadow: 0 6px 24px rgba(91,45,142,.12);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px 24px;
    text-align: center;
    position: relative;
  }
  .flashcard:hover { box-shadow: 0 8px 32px rgba(91,45,142,.18); }

  .card-en { font-size: 1.6rem; font-weight: 700; color: var(--purple); margin-bottom: 4px; }
  .card-ko { font-size: 1.3rem; font-weight: 600; color: #222; margin-top: 12px; line-height: 1.5; }

  .card-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 400px;
    margin-bottom: 14px;
    gap: 8px;
  }
  .btn-nav {
    background: #fff;
    border: 1.5px solid var(--purple-border);
    color: var(--purple);
    border-radius: 20px;
    padding: 7px 18px;
    font-size: .85rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s;
    white-space: nowrap;
  }
  .btn-nav:hover:not(:disabled) { background: #f0eaf8; }
  .btn-nav:disabled { opacity: .3; cursor: default; }

  .card-nav-dots {
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--gray-bar);
    transition: background .2s;
  }
  .dot.active { background: var(--purple); transform: scale(1.3); }
  .dot.done { background: var(--green); }

  .btn-speak {
    background: #f0eaf8;
    color: var(--purple);
    border: none;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: .8rem;
    cursor: pointer;
    margin-top: 6px;
    transition: background .2s;
  }
  .btn-speak:hover { background: #e0d0f5; }


  .practice-done {
    text-align: center;
    padding: 40px 24px;
  }
  .practice-done .big-emoji { font-size: 3.5rem; margin-bottom: 12px; }
  .practice-done h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; }
  .practice-done p { color: var(--text-sub); margin-bottom: 24px; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-sub);
  }
  .empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }
  .empty-state p { font-size: .95rem; line-height: 1.6; }

  .toast {
    position: fixed;
    bottom: 90px; left: 50%; transform: translateX(-50%) translateY(10px);
    background: #333; color: #fff;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: .85rem;
    z-index: 500;
    opacity: 0; transition: opacity .25s, transform .25s;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* 자동재생 버튼 */
  .btn-autoplay {
    background: rgba(255,255,255,.2);
    border: 1.5px solid rgba(255,255,255,.5);
    color: #fff;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: .82rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background .2s;
    display: flex; align-items: center; gap: 5px;
  }
  .btn-autoplay:hover { background: rgba(255,255,255,.35); }
  .btn-autoplay.on { background: #fff; color: var(--purple); border-color: #fff; }

  /* 자동재생 진행 바 */
  .autoplay-bar-wrap {
    width: 100%;
    max-width: 400px;
    height: 4px;
    background: var(--gray-bar);
    border-radius: 2px;
    margin-top: 14px;
    overflow: hidden;
    display: none;
  }
  .autoplay-bar-wrap.show { display: block; }
  .autoplay-bar-fill {
    height: 100%;
    background: var(--purple);
    border-radius: 2px;
    width: 0%;
    transition: width linear;
  }
</style>
</head>
<body>

<header>
  <h1>📚 영어 단어장</h1>
  <button class="btn-icon" title="검색" onclick="toggleSearch()">🔍</button>
</header>

<main>
  <div id="searchBox" style="display:none; margin-bottom:14px;">
    <input type="text" id="searchInput" placeholder="단어 검색..." oninput="renderDecks()">
  </div>
  <div class="section-label">내 단어장</div>
  <div class="deck-list" id="deckList"></div>
</main>

<button class="fab" onclick="openNewDeckModal()">+</button>

<!-- Deck Editor Modal -->
<div class="modal-overlay" id="deckModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="deckModalTitle">새 단어장</span>
      <button class="btn-close" onclick="closeModal('deckModal')">×</button>
    </div>

    <div class="form-group">
      <label>단어장 이름</label>
      <input type="text" id="deckNameInput" placeholder="예: TOEIC 필수 단어, 일상 숙어">
    </div>

    <hr class="divider">

    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
      <label style="margin-bottom:0;">단어 목록</label>
      <span id="wordCount" style="font-size:.8rem; color:var(--text-sub);">0개</span>
    </div>

    <div class="word-list" id="wordListUI"></div>

    <div class="add-word-row">
      <input type="text" id="newWordEn" placeholder="영어 단어/숙어" onkeydown="if(event.key==='Enter')addWordToList()">
      <button class="translate-btn" id="transBtn" onclick="autoTranslate()">🔄 번역</button>
      <input type="text" id="newWordKo" placeholder="한국어 뜻" onkeydown="if(event.key==='Enter')addWordToList()">
      <button class="btn-add-word" onclick="addWordToList()">추가</button>
    </div>
    <div style="font-size:.75rem; color:var(--text-sub); margin-bottom:16px; padding-left:2px;">
      Enter 또는 추가 버튼으로 등록 · 🔄 버튼으로 자동 번역
    </div>

    <button class="btn-primary" onclick="saveDeck()">저장하기</button>
  </div>
</div>

<!-- Practice Screen -->
<div class="practice-screen" id="practiceScreen">
  <div class="practice-header">
    <button class="btn-icon" onclick="closePractice()">←</button>
    <h2 id="practiceTitle"></h2>
    <button class="btn-autoplay" id="btnAutoPlay" onclick="toggleAutoPlay()">▶ 자동재생</button>
    <span class="practice-progress" id="practiceProgress"></span>
  </div>
  <div class="practice-content" id="practiceContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'vocabDecks_v1';

function loadDecks() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function saveDecks(decks) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(decks));
}
function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let decks = loadDecks();

// ── Deck List ──────────────────────────────────────────────
function renderDecks() {
  const list = document.getElementById('deckList');
  const q = (document.getElementById('searchInput')?.value || '').toLowerCase().trim();

  let filtered = decks;
  if (q) {
    filtered = decks.map(d => ({
      ...d,
      words: d.words.filter(w => w.en.toLowerCase().includes(q) || w.ko.toLowerCase().includes(q))
    })).filter(d => d.words.length > 0 || d.name.toLowerCase().includes(q));
  }

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <div class="emoji">📖</div>
      <p>${q ? '검색 결과가 없습니다.' : '단어장이 없습니다.<br>아래 + 버튼으로 첫 단어장을 만들어보세요!'}</p>
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(deck => {
    const total = deck.words.length;
    const mastered = deck.words.filter(w => w.mastered).length;
    const pct = total ? Math.round((mastered / total) * 100) : 0;
    return `
    <div class="deck-card">
      <div class="deck-body">
        <div class="deck-title">${escHtml(deck.name)}</div>
        <div class="deck-meta">${mastered} of ${total} cards mastered</div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" style="width:${pct}%"></div>
        </div>
      </div>
      <div class="deck-footer">
        <button class="btn-practice" onclick="startPractice('${deck.id}')">
          Practice this deck →
        </button>
        <div class="deck-actions">
          <button class="btn-small" onclick="openEditDeckModal('${deck.id}')">✏️ 편집</button>
          <button class="btn-small danger" onclick="deleteDeck('${deck.id}')">🗑️</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Search ─────────────────────────────────────────────────
function toggleSearch() {
  const box = document.getElementById('searchBox');
  const open = box.style.display !== 'none';
  box.style.display = open ? 'none' : 'block';
  if (!open) document.getElementById('searchInput').focus();
  else { document.getElementById('searchInput').value = ''; renderDecks(); }
}

// ── Modal ──────────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.getElementById('deckModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal('deckModal');
});

// ── Deck Editor ────────────────────────────────────────────
let editingDeckId = null;
let pendingWords = [];

function openNewDeckModal() {
  editingDeckId = null;
  pendingWords = [];
  document.getElementById('deckNameInput').value = '';
  document.getElementById('newWordEn').value = '';
  document.getElementById('newWordKo').value = '';
  document.getElementById('deckModalTitle').textContent = '새 단어장';
  renderWordListUI();
  openModal('deckModal');
  setTimeout(() => document.getElementById('deckNameInput').focus(), 150);
}

function openEditDeckModal(deckId) {
  const deck = decks.find(d => d.id === deckId);
  if (!deck) return;
  editingDeckId = deckId;
  pendingWords = deck.words.map(w => ({ ...w }));
  document.getElementById('deckNameInput').value = deck.name;
  document.getElementById('newWordEn').value = '';
  document.getElementById('newWordKo').value = '';
  document.getElementById('deckModalTitle').textContent = '단어장 편집';
  renderWordListUI();
  openModal('deckModal');
}

function renderWordListUI() {
  const ul = document.getElementById('wordListUI');
  document.getElementById('wordCount').textContent = pendingWords.length + '개';
  if (pendingWords.length === 0) {
    ul.innerHTML = '<div style="text-align:center;color:#bbb;padding:12px;font-size:.85rem;">아직 단어가 없습니다</div>';
    return;
  }
  ul.innerHTML = pendingWords.map((w, i) => `
    <div class="word-item">
      <div class="word-item-text">
        <div class="word-en">${escHtml(w.en)}</div>
        <div class="word-ko">${escHtml(w.ko)}</div>
      </div>
      <button class="btn-small" style="padding:2px 6px;flex-shrink:0;" onclick="speak('${escHtml(w.en).replace(/'/g,"\\'")}')">🔊</button>
      ${w.mastered ? '<span class="word-mastered-badge">✓ 암기</span>' : ''}
      <button class="btn-small danger" style="padding:2px 6px;flex-shrink:0;" onclick="removeWord(${i})">✕</button>
    </div>`).join('');
}

function removeWord(idx) {
  pendingWords.splice(idx, 1);
  renderWordListUI();
}

function addWordToList() {
  const en = document.getElementById('newWordEn').value.trim();
  const ko = document.getElementById('newWordKo').value.trim();
  if (!en) { showToast('영어 단어를 입력하세요'); document.getElementById('newWordEn').focus(); return; }
  if (!ko) { showToast('한국어 뜻을 입력하세요'); document.getElementById('newWordKo').focus(); return; }
  pendingWords.push({ id: genId(), en, ko, mastered: false });
  document.getElementById('newWordEn').value = '';
  document.getElementById('newWordKo').value = '';
  renderWordListUI();
  document.getElementById('newWordEn').focus();
}

// ── Auto Translate (MyMemory API) ──────────────────────────
async function autoTranslate() {
  const en = document.getElementById('newWordEn').value.trim();
  if (!en) { showToast('번역할 영어를 먼저 입력하세요'); return; }
  const btn = document.getElementById('transBtn');
  btn.classList.add('loading');
  btn.textContent = '번역 중...';
  try {
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(en)}&langpair=en|ko`;
    const resp = await fetch(url);
    const data = await resp.json();
    if (data.responseStatus === 200) {
      document.getElementById('newWordKo').value = data.responseData.translatedText;
      document.getElementById('newWordKo').focus();
    } else {
      showToast('번역 실패. 직접 입력해주세요.');
    }
  } catch {
    showToast('번역 서버에 연결할 수 없습니다.');
  } finally {
    btn.classList.remove('loading');
    btn.textContent = '🔄 번역';
  }
}

// ── Save Deck ──────────────────────────────────────────────
function saveDeck() {
  const name = document.getElementById('deckNameInput').value.trim();
  if (!name) { showToast('단어장 이름을 입력하세요'); return; }

  // auto-add any filled word in input fields
  const en = document.getElementById('newWordEn').value.trim();
  const ko = document.getElementById('newWordKo').value.trim();
  if (en && ko) pendingWords.push({ id: genId(), en, ko, mastered: false });

  if (editingDeckId) {
    const idx = decks.findIndex(d => d.id === editingDeckId);
    if (idx !== -1) { decks[idx].name = name; decks[idx].words = pendingWords; }
  } else {
    decks.push({ id: genId(), name, words: pendingWords, createdAt: Date.now() });
  }
  saveDecks(decks);
  renderDecks();
  closeModal('deckModal');
  showToast(editingDeckId ? '단어장이 수정되었습니다' : '단어장이 저장되었습니다 ✓');
}

// ── Delete Deck ────────────────────────────────────────────
function deleteDeck(deckId) {
  if (!confirm('이 단어장을 삭제하시겠습니까?')) return;
  decks = decks.filter(d => d.id !== deckId);
  saveDecks(decks);
  renderDecks();
  showToast('삭제되었습니다');
}

// ── Practice Mode ──────────────────────────────────────────
let practiceState = {};

function startPractice(deckId) {
  const deck = decks.find(d => d.id === deckId);
  if (!deck || deck.words.length === 0) { showToast('단어를 먼저 추가하세요'); return; }
  const queue = [...deck.words].sort(() => Math.random() - .5);
  practiceState = { deckId, queue, idx: 0 };
  document.getElementById('practiceTitle').textContent = deck.name;
  document.getElementById('practiceScreen').classList.add('open');
  renderCard();
}

function renderCard() {
  const { queue, idx } = practiceState;
  const content = document.getElementById('practiceContent');
  document.getElementById('practiceProgress').textContent = `${Math.min(idx + 1, queue.length)} / ${queue.length}`;

  if (idx >= queue.length) {
    const mastered = queue.filter(w => w.mastered).length;
    content.innerHTML = `
      <div class="practice-done">
        <div class="big-emoji">🎉</div>
        <h2>연습 완료!</h2>
        <p>${queue.length}개 단어 중 <strong>${mastered}개</strong>를 암기했습니다</p>
        <button class="btn-primary" style="max-width:200px;margin:0 auto;" onclick="closePractice()">완료</button>
      </div>`;
    return;
  }

  const word = queue[idx];
  const hasPrev = idx > 0;
  content.innerHTML = `
    <div class="card-nav">
      <button class="btn-nav" ${hasPrev ? '' : 'disabled'} onclick="goCard(-1)">← 이전</button>
      <span class="card-nav-dots">${queue.map((_, i) => `<span class="dot ${i === idx ? 'active' : i < idx ? 'done' : ''}"></span>`).slice(Math.max(0, idx-3), idx+4).join('')}</span>
      <button class="btn-nav" onclick="goCard(1)">다음 →</button>
    </div>
    <div class="flashcard" id="flashcard">
      <div class="card-en">${escHtml(word.en)}</div>
      <button class="btn-speak" onclick="event.stopPropagation();speak('${escHtml(word.en).replace(/'/g,"\\'")}')">🔊 발음 듣기</button>
      <div class="card-ko">${escHtml(word.ko)}</div>
    </div>
    `;
}

function goCard(dir) {
  stopAutoPlay();
  const { queue, idx } = practiceState;
  const next = idx + dir;
  if (next < 0 || next > queue.length) return;
  practiceState.idx = next;
  renderCard();
  if (!AP.running && next < queue.length) speak(queue[next].en);
}



function closePractice() {
  stopAutoPlay();
  document.getElementById('practiceScreen').classList.remove('open');
  renderDecks();
}

// ── Auto Play ──────────────────────────────────────────────
const AP = { running: false, timer: null };

// ── 화면 잠금 중 오디오 세션 유지 (Web Audio API 무음 루프) ──
let _keepCtx = null, _keepSrc = null;

function startAudioKeepalive() {
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    if (_keepCtx && _keepCtx.state !== 'closed') {
      if (_keepCtx.state === 'suspended') _keepCtx.resume();
      return;
    }
    _keepCtx = new AC();
    // 2초짜리 무음 버퍼를 루프 재생 → OS가 미디어 세션으로 인식해 잠금 화면에서도 유지
    const buf = _keepCtx.createBuffer(1, _keepCtx.sampleRate * 2, _keepCtx.sampleRate);
    _keepSrc = _keepCtx.createBufferSource();
    _keepSrc.buffer = buf;
    _keepSrc.loop = true;
    _keepSrc.connect(_keepCtx.destination);
    _keepSrc.start(0);
  } catch(e) {}
}

function stopAudioKeepalive() {
  try {
    if (_keepSrc)  { _keepSrc.stop(); _keepSrc = null; }
    if (_keepCtx)  { _keepCtx.close(); _keepCtx = null; }
  } catch(e) {}
}

// MediaSession API — 잠금 화면 컨트롤 등록 (미지원 브라우저 안전 처리)
function setupMediaSession(word) {
  try {
    if (!navigator.mediaSession) return;
    if (window.MediaMetadata) {
      navigator.mediaSession.metadata = new MediaMetadata({
        title: word || '단어 자동재생',
        artist: '토익 영어 단어장',
      });
    }
    var actions = {
      play:  function() { if (!AP.running) startAutoPlay(); },
      pause: function() { if (AP.running)  stopAutoPlay(); },
      stop:  function() { if (AP.running)  stopAutoPlay(); }
    };
    Object.keys(actions).forEach(function(action) {
      try { navigator.mediaSession.setActionHandler(action, actions[action]); } catch(e) {}
    });
  } catch(e) {}
}

function toggleAutoPlay() {
  AP.running ? stopAutoPlay() : startAutoPlay();
}

function startAutoPlay() {
  AP.running = true;
  startAudioKeepalive();
  setupMediaSession('자동재생 중...');
  const btn = document.getElementById('btnAutoPlay');
  if (btn) { btn.textContent = '⏹ 정지'; btn.classList.add('on'); }
  runAutoStep();
}

function stopAutoPlay() {
  AP.running = false;
  clearTimeout(AP.timer);
  try { if (window.speechSynthesis) window.speechSynthesis.cancel(); } catch(e) {}
  if (currentAudio) {
    currentAudio.onended = null;
    currentAudio.onerror = null;
    try { currentAudio.pause(); } catch(e) {}
    currentAudio = null;
  }
  stopAudioKeepalive();
  const btn = document.getElementById('btnAutoPlay');
  if (btn) { btn.textContent = '▶ 자동재생'; btn.classList.remove('on'); }
}

// 괄호/부연설명·구분자 제거하여 TTS 잡음 방지
function cleanTTS(text) {
  return text
    .replace(/\([^)]*\)/g, '')  // (괄호 내용) 제거 — (명)(동)(형) 등 품사 기호 포함
    .replace(/\[[^\]]*\]/g, '') // [대괄호 내용] 제거
    .replace(/\|/g, ', ')       // | 구분자 → 쉼표로 (자연스럽게 읽힘)
    .replace(/\s+/g, ' ')
    .trim();
}

// 자동재생 — 영어 발음 후 타이머로 다음 단어 이동 (콜백 없음)
function runAutoStep() {
  if (!AP.running) return;
  const { queue, idx } = practiceState;
  if (idx >= queue.length) { stopAutoPlay(); return; }

  const word = queue[idx];
  setupMediaSession(word.en);
  autoPlaySpeak(word.en);

  // 단어 길이에 비례한 간격 후 다음 단어로 이동
  const delay = Math.max(3000, word.en.length * 200 + 1500);
  AP.timer = setTimeout(function() {
    if (!AP.running) return;
    practiceState.idx = idx + 1;
    renderCard();
    runAutoStep();
  }, delay);
}

// 자동재생 전용 TTS — 발음만 재생, 콜백/시퀀스 없음
function autoPlaySpeak(text) {
  // 이전 발화·오디오 즉시 정지
  try { if (window.speechSynthesis) window.speechSynthesis.cancel(); } catch(e) {}
  if (currentAudio) {
    currentAudio.onended = null;
    currentAudio.onerror = null;
    try { currentAudio.pause(); } catch(e) {}
    currentAudio = null;
  }

  if (isSamsungBrowser) {
    // 삼성 브라우저: Google TTS Audio — setTimeout에서도 재생 허용됨
    var url = 'https://translate.google.com/translate_tts?ie=UTF-8&tl=en-US&client=tw-ob&q='
      + encodeURIComponent(text);
    currentAudio = new Audio(url);
    safePlay(currentAudio, function() {
      currentAudio = null;
      _wsSpeak(text, false); // 폴백: Web Speech API
    });
    return;
  }

  // iOS / Android Chrome / PC / macOS Safari: Web Speech API
  // iOS는 setTimeout 없이 즉시 speak (setTimeout 사용 시 사용자 제스처 컨텍스트 단절)
  // Android Chrome: Audio.play()가 setTimeout에서 차단되므로 Web Speech API 사용
  _wsSpeak(text, isIOS);
}

function _wsSpeak(text, immediate) {
  if (!window.speechSynthesis) return;
  var utter = new SpeechSynthesisUtterance(text);
  utter.lang   = 'en-US';
  utter.rate   = 0.9;
  utter.volume = 1;
  if (cachedVoices.length) {
    var maleNames = /david|mark|fred|alex|daniel|google uk english male|microsoft david|microsoft mark/i;
    var v = cachedVoices.find(function(x) { return x.lang === 'en-US' && maleNames.test(x.name); })
          || cachedVoices.find(function(x) { return x.lang.indexOf('en') === 0 && maleNames.test(x.name); })
          || cachedVoices.find(function(x) { return x.lang === 'en-US'; })
          || cachedVoices.find(function(x) { return x.lang.indexOf('en') === 0; });
    if (v) utter.voice = v;
  }
  if (immediate) {
    if (!AP.running) return;
    try { window.speechSynthesis.speak(utter); } catch(e) {}
  } else {
    // PC / Android 폴백: 50ms 후 speak (cancel() 완전 처리 대기)
    setTimeout(function() {
      if (!AP.running) return;
      try { window.speechSynthesis.speak(utter); } catch(e) {}
    }, 50);
  }
}

// ── Text-to-Speech ─────────────────────────────────────────
const isIOS           = /iPhone|iPad|iPod/i.test(navigator.userAgent);
const isAndroid       = /Android/i.test(navigator.userAgent);
const isSamsungBrowser = /SamsungBrowser/i.test(navigator.userAgent);
const isMobile        = isIOS || isAndroid;

// 음성 목록 캐시 — voiceschanged 미발생 브라우저(삼성 등) 대비 폴링 병행
let cachedVoices = [];
function loadVoices() {
  if (!window.speechSynthesis) return;
  const v = window.speechSynthesis.getVoices();
  if (v && v.length) cachedVoices = v;
}
if (window.speechSynthesis) {
  try { window.speechSynthesis.addEventListener('voiceschanged', loadVoices); } catch(e) {}
  loadVoices();
  // 삼성·구형 브라우저: voiceschanged 미발생 대비 폴링 (250ms × 최대 20회)
  let _pollCount = 0;
  const _pollVoices = setInterval(function() {
    loadVoices();
    if (cachedVoices.length || ++_pollCount >= 20) clearInterval(_pollVoices);
  }, 250);
}

let currentAudio = null;

// Audio.play() — IE11은 Promise 미반환이므로 안전하게 처리
function safePlay(audio, onFail) {
  try {
    const p = audio.play();
    if (p && typeof p.catch === 'function') p.catch(onFail);
  } catch(e) { if (onFail) onFail(); }
}

// Google TTS Audio — Web Speech API 미지원 환경 폴백
function speakAudio(text) {
  if (currentAudio) { try { currentAudio.pause(); } catch(e) {} currentAudio = null; }
  const url = 'https://translate.google.com/translate_tts'
    + '?ie=UTF-8&tl=en-US&client=tw-ob&q=' + encodeURIComponent(text);
  currentAudio = new Audio(url);
  safePlay(currentAudio, function() { currentAudio = null; });
}

// Web Speech API — 전 브라우저 공통 (삼성·IE 호환)
function speakWebAPI(text) {
  if (!window.speechSynthesis) { speakAudio(text); return; }
  // 삼성·구형 브라우저: 이전 발화 중이면 cancel 후 50ms 대기
  try {
    if (window.speechSynthesis.speaking || window.speechSynthesis.pending) {
      window.speechSynthesis.cancel();
    }
  } catch(e) {}
  setTimeout(function() {
    try {
      var utter = new SpeechSynthesisUtterance(text);
      utter.lang   = 'en-US';
      utter.rate   = 0.85;
      utter.volume = 1;
      if (cachedVoices.length) {
        var maleNames = /david|mark|fred|alex|daniel|google uk english male|microsoft david|microsoft mark/i;
        var found = cachedVoices.find(function(x) { return x.lang === 'en-US' && maleNames.test(x.name); })
                 || cachedVoices.find(function(x) { return x.lang.indexOf('en') === 0 && maleNames.test(x.name); })
                 || cachedVoices.find(function(x) { return x.lang === 'en-US'; })
                 || cachedVoices.find(function(x) { return x.lang.indexOf('en') === 0; });
        if (found) utter.voice = found;
      }
      window.speechSynthesis.speak(utter);
    } catch(e) { speakAudio(text); } // Web Speech API 실패 시 Google TTS 폴백
  }, 50);
}

function speak(text) {
  if (window.speechSynthesis) {
    speakWebAPI(text);
  } else {
    speakAudio(text);
  }
}

// ── 강제 화이트 배경 (삼성 브라우저 다크모드 JS 차단) ──────
function forceLight() {
  document.documentElement.style.cssText += ';background:#fff!important;color:#1a1a1a!important;filter:none!important;';
  document.body.style.cssText            += ';background:#fff!important;color:#1a1a1a!important;filter:none!important;';
}
forceLight();
// MutationObserver: 삼성 브라우저가 나중에 다크 스타일 주입해도 재적용
new MutationObserver(forceLight).observe(document.documentElement, { attributes: true, attributeFilter: ['style', 'class'] });

// ── iOS/macOS Safari: 화면 잠금 해제 후 AudioContext 재개 ──
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible') {
    // AudioContext가 suspended 상태이면 재개
    if (_keepCtx && _keepCtx.state === 'suspended') {
      try { _keepCtx.resume(); } catch(e) {}
    }
    // iOS Safari: speechSynthesis가 멈춘 경우 재개
    if (AP.running && window.speechSynthesis) {
      try { window.speechSynthesis.resume(); } catch(e) {}
    }
  }
});

function seedDefaultDecks() {
  const DECK_NAME = 'Counter-UAS 드론 전문 용어';
  const TOEIC_NAME = '토익 1200 단어';
  const newWords = ALL_DEFAULT_WORDS.map(([en, ko]) => ({ id: genId(), en, ko, mastered: false }));

  // 구버전(두 개로 분리된) 단어장 병합
  const old1 = decks.findIndex(d => d.name === DECK_NAME + ' (1)');
  const old2 = decks.findIndex(d => d.name === DECK_NAME + ' (2)');
  if (old1 !== -1 && old2 !== -1) {
    decks.splice(Math.max(old1, old2), 1);
    decks.splice(Math.min(old1, old2), 1);
  }

  // Counter-UAS 단어장 버전 확인 — 구버전이면 단어 교체
  const existing = decks.findIndex(d => d.name === DECK_NAME);
  if (existing === -1) {
    decks.unshift({ id: genId(), name: DECK_NAME, version: DECK_VERSION, createdAt: Date.now(), words: newWords });
  } else if ((decks[existing].version || 1) < DECK_VERSION) {
    const masteredSet = new Set(decks[existing].words.filter(w => w.mastered).map(w => w.en));
    decks[existing].words = newWords.map(w => ({ ...w, mastered: masteredSet.has(w.en) }));
    decks[existing].version = DECK_VERSION;
  }

  // 토익 단어장 — 기존 단일 덱을 3개로 분리 (마이그레이션)
  const TOEIC_NAME_A = '토익 1200 단어 (1~400)';
  const TOEIC_NAME_B = '토익 1200 단어 (401~800)';
  const TOEIC_NAME_C = '토익 1200 단어 (801~1200)';
  const oldToeicIdx = decks.findIndex(d => d.name === TOEIC_NAME);
  let oldMasteredSet = new Set();
  if (oldToeicIdx !== -1) {
    oldMasteredSet = new Set(decks[oldToeicIdx].words.filter(w => w.mastered).map(w => w.en));
    decks.splice(oldToeicIdx, 1);
  }

  const makeWords = (slice) => slice.map(([en, ko]) => ({ id: genId(), en, ko, mastered: oldMasteredSet.has(en) }));
  const slices = [TOEIC_WORDS_1.slice(0, 400), TOEIC_WORDS_1.slice(400, 800), TOEIC_WORDS_1.slice(800)];
  const names = [TOEIC_NAME_A, TOEIC_NAME_B, TOEIC_NAME_C];

  slices.forEach((slice, i) => {
    const words = makeWords(slice);
    const idx = decks.findIndex(d => d.name === names[i]);
    if (idx === -1) {
      decks.push({ id: genId(), name: names[i], version: 1, createdAt: Date.now(), words });
    } else if (decks[idx].words.length < words.length) {
      const ms = new Set(decks[idx].words.filter(w => w.mastered).map(w => w.en));
      decks[idx].words = words.map(w => ({ ...w, mastered: ms.has(w.en) }));
    }
  });

  saveDecks(decks);
}
