<script>
(function(){
  var params=new URLSearchParams(location.search);
  var urlToken=params.get('dcd_token');
  var granted=false;
  if(urlToken){
    try{
      var stored=JSON.parse(localStorage.getItem('dcd_lab_token')||'null');
      if(stored&&stored.token===urlToken&&stored.expiry>Date.now()){
        granted=true;
        localStorage.removeItem('dcd_lab_token');
      }
    }catch(e){}
  }
  if(!granted){
    document.addEventListener('DOMContentLoaded',function(){
      document.body.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#0a0c10;color:#c8d0e0;font-family:sans-serif;gap:20px;text-align:center;padding:20px">'
        +'<div style="font-size:48px">🔒</div>'
        +'<div style="font-size:18px;font-weight:700;color:#ff5c5c">접근이 차단되었습니다</div>'
        +'<div style="font-size:13px;color:#5a6478;max-width:360px">이 시뮬레이션은 DcD 플랫폼 LAB 게시판을 통해서만 접근할 수 있습니다.</div>'
        +'<a href="https://jeongb5215-web.github.io/dcd-platform/" style="margin-top:10px;padding:10px 24px;background:#1e3a6e;color:#fff;text-decoration:none;font-size:13px;font-weight:700">DcD 플랫폼으로 이동</a>'
        +'</div>';
    });
  }
})();
</script>

<style>
:root{
  --bg:#0a0c10;--surface:#111520;--border:#1e2535;
  --blue:#4fa3ff;--red:#ff5c5c;--green:#38e69b;
  --gold:#f4b942;--purple:#8b5cf6;--orange:#f97316;
  --cyan:#22d3ee;--text:#ffffff;--muted:#b0bac8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 18px;height:50px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.logo{font-family:'Dancing Script',cursive;font-size:20px;color:#fff}
.logo span{color:var(--blue)}
.hdr-t{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.hdr-b{background:rgba(255,92,92,.15);border:1px solid rgba(255,92,92,.4);color:var(--red);font-size:10px;padding:2px 8px;border-radius:20px}
.back-btn{color:var(--muted);font-size:11px;text-decoration:none;display:flex;align-items:center;gap:4px;transition:color .2s}
.back-btn:hover{color:var(--text)}
.divider{width:1px;height:16px;background:var(--border)}
main{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:12px 16px;flex-direction:column;gap:12px}
.chart-wrap{flex:1;width:100%;display:flex;align-items:center;justify-content:center;min-height:0}
svg.c2{width:100%;height:100%;max-height:calc(100vh - 120px)}
.note-bar{width:100%;max-width:1360px;background:rgba(255,92,92,.06);border:1px solid rgba(255,92,92,.2);border-radius:8px;padding:10px 18px;display:flex;gap:12px;align-items:flex-start;flex-shrink:0}
.note-icon{color:var(--red);font-size:13px;font-weight:900;margin-top:1px;flex-shrink:0}
.note-text{font-size:11.5px;line-height:1.7;color:var(--text)}
.note-text strong{color:var(--red)}

@keyframes flowDash{to{stroke-dashoffset:-40}}
@keyframes flowDashSlow{to{stroke-dashoffset:-60}}
@keyframes pulseGlow{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.c2 .flow-line{animation:flowDash 1.2s linear infinite}
.c2 .flow-slow{animation:flowDashSlow 2s linear infinite}
.c2 .pulse{animation:pulseGlow 2s ease-in-out infinite}
.c2 g.box-group{animation:fadeIn .5s ease both}
</style>
</head>
