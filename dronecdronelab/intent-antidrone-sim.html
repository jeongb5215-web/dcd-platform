<head>
<meta charset="UTF-8">

<title>의도 기반 안티드론 시뮬레이터 | DcD Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0c10;--surface:#111520;--border:#1e2535;
  --blue:#4fa3ff;--red:#ff5c5c;--green:#38e69b;
  --gold:#f4b942;--purple:#8b5cf6;--orange:#f97316;
  --cyan:#22d3ee;--text:#ffffff;--muted:#b0bac8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── Header ── */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 18px;height:50px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.logo{font-family:'Dancing Script',cursive;font-size:20px;color:#fff}
.logo span{color:var(--blue)}
.hdr-t{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.hdr-b{background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.4);color:var(--purple);font-size:10px;padding:2px 8px;border-radius:20px}
.nav-btn{font-size:11px;text-decoration:none;display:flex;align-items:center;gap:5px;padding:3px 12px;border-radius:20px;transition:all .2s;font-weight:600}
.nav-btn.home{color:var(--muted);border:1px solid var(--border);background:transparent}
.nav-btn.home:hover{color:var(--text);border-color:#5a6478}
.nav-btn.lab{color:var(--purple);border:1px solid rgba(139,92,246,.4);background:rgba(139,92,246,.1)}
.nav-btn.lab:hover{background:rgba(139,92,246,.22)}
.hdr-div{width:1px;height:16px;background:var(--border)}

/* ── Phase Bar ── */
.phase-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:5px;flex-shrink:0;flex-wrap:wrap}
.ph{padding:5px 13px;border-radius:4px;font-size:11px;font-weight:700;border:1.5px solid #222;color:#3a4560;background:#0e1218;transition:all .35s ease;white-space:nowrap;cursor:default}
.ph.gold{border-color:#2a2008}.ph.gold.active{background:rgba(244,185,66,.18);border-color:var(--gold);color:var(--gold);box-shadow:0 0 14px rgba(244,185,66,.4)}
.ph.gold.done{background:rgba(244,185,66,.07);border-color:rgba(244,185,66,.3);color:rgba(244,185,66,.7)}
.ph.blue{border-color:#0d1a2a}.ph.blue.active{background:rgba(79,163,255,.18);border-color:var(--blue);color:var(--blue);box-shadow:0 0 14px rgba(79,163,255,.4)}
.ph.blue.done{background:rgba(79,163,255,.07);border-color:rgba(79,163,255,.3);color:rgba(79,163,255,.7)}
.ph.red{border-color:#200808}.ph.red.active{background:rgba(255,92,92,.18);border-color:var(--red);color:var(--red);box-shadow:0 0 14px rgba(255,92,92,.4)}
.ph.red.done{background:rgba(255,92,92,.07);border-color:rgba(255,92,92,.3);color:rgba(255,92,92,.7)}
.ph.green{border-color:#081a0f}.ph.green.active{background:rgba(56,230,155,.18);border-color:var(--green);color:var(--green);box-shadow:0 0 14px rgba(56,230,155,.4)}
.ph.green.done{background:rgba(56,230,155,.07);border-color:rgba(56,230,155,.3);color:rgba(56,230,155,.7)}
.ph.orange{border-color:#201008}.ph.orange.active{background:rgba(249,115,22,.18);border-color:var(--orange);color:var(--orange);box-shadow:0 0 14px rgba(249,115,22,.4)}
.ph.orange.done{background:rgba(249,115,22,.07);border-color:rgba(249,115,22,.3);color:rgba(249,115,22,.7)}
.ph.purple{border-color:#14082a}.ph.purple.active{background:rgba(139,92,246,.18);border-color:var(--purple);color:var(--purple);box-shadow:0 0 14px rgba(139,92,246,.4)}
.ph.purple.done{background:rgba(139,92,246,.07);border-color:rgba(139,92,246,.3);color:rgba(139,92,246,.7)}
.ph-arrow{color:#252d40;font-size:12px;flex-shrink:0}
.ph-branch{display:flex;flex-direction:column;gap:3px}
.ph-status{margin-left:auto;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;background:rgba(79,163,255,.06);border:1px solid rgba(79,163,255,.2);color:var(--muted);transition:all .3s;white-space:nowrap}
.ph-status.ok{background:rgba(56,230,155,.1);border-color:rgba(56,230,155,.35);color:var(--green)}
.ph-status.alert{background:rgba(255,92,92,.1);border-color:rgba(255,92,92,.35);color:var(--red)}

/* ── Main ── */
main{flex:1;display:flex;flex-direction:column;padding:8px 14px;gap:8px;overflow:hidden;min-height:0}
.map-wrap{flex:1;min-height:0}
svg.sim{width:100%;height:100%}

/* ── Flow Bar ── */
.flow-bar{display:flex;align-items:stretch;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;flex-shrink:0;height:64px}
.fn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border-right:1px solid var(--border);padding:6px 10px;transition:background .35s}
.fn:last-child{border-right:none;flex:1.8}
.fn-lbl{font-size:9px;color:#3a4560;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:color .35s}
.fn-title{font-size:12px;font-weight:700;color:#2a3550;transition:color .35s}
.fn.active{background:rgba(79,163,255,.07)}
.fn.active .fn-lbl{color:var(--blue)}
.fn.active .fn-title{color:var(--text)}
.fn-assets{display:flex;gap:6px;margin-top:2px}
.asset{font-size:9px;padding:2px 7px;border-radius:10px;border:1px solid #1e2535;color:#2a3550;font-weight:700;transition:all .35s}
.asset.on{border-color:var(--red);color:var(--red);background:rgba(255,92,92,.1);box-shadow:0 0 6px rgba(255,92,92,.25)}
.fn-arrow{display:flex;align-items:center;justify-content:center;color:#1e2535;font-size:14px;padding:0 2px;flex-shrink:0}

/* ── Controls ── */
.controls{background:var(--surface);border-top:1px solid var(--border);padding:9px 16px;display:flex;gap:10px;align-items:center;flex-shrink:0}
.ctrl-lbl{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:1px;white-space:nowrap}
.btn{padding:7px 18px;border-radius:6px;font-size:11px;font-weight:700;border:1.5px solid;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-1{background:rgba(56,230,155,.1);border-color:rgba(56,230,155,.4);color:var(--green)}
.btn-1:hover{background:rgba(56,230,155,.2)}
.btn-1:disabled{opacity:.4;cursor:not-allowed}
.btn-2{background:rgba(255,92,92,.1);border-color:rgba(255,92,92,.4);color:var(--red)}
.btn-2:hover{background:rgba(255,92,92,.2)}
.btn-2:disabled{opacity:.4;cursor:not-allowed}
.btn-r{background:transparent;border-color:#2a3550;color:var(--muted);margin-left:auto}
.btn-r:hover{border-color:var(--muted);color:var(--text)}
</style>

<script>
/* ─── state ─────────────────────────────────────────────── */
let running = false;
let cancelled = false;
let rafIds = [];
let timerIds = [];

/* ─── helpers ────────────────────────────────────────────── */
const $ = id => document.getElementById(id);

function wait(ms) {
  return new Promise(res => {
    if (cancelled) { res(); return; }
    timerIds.push(setTimeout(res, ms));
  });
}

function setOpacity(id, v) { const e=$(id); if(e) e.setAttribute('opacity', v); }
function setFill(id, v)    { const e=$(id); if(e) e.setAttribute('fill', v); }
function setStroke(id, v)  { const e=$(id); if(e) e.setAttribute('stroke', v); }

/* drone color */
function droneColor(c) {
  ['ds-body'].forEach(id => setFill(id, c));
  ['ds-a1','ds-a2','ds-a3','ds-a4','ds-r1','ds-r2'].forEach(id => setStroke(id, c));
}

/* smooth drone move via rAF */
function moveDrone(tx, ty, ms) {
  return new Promise(res => {
    if (cancelled) { res(); return; }
    const el = $('drone-sim');
    const tr = el.getAttribute('transform') || 'translate(678,34)';
    const m  = tr.match(/translate\(([^,]+),([^)]+)\)/);
    const sx = parseFloat(m ? m[1] : 678);
    const sy = parseFloat(m ? m[2] : 34);
    const t0 = performance.now();
    function step(now) {
      if (cancelled) { res(); return; }
      const p  = Math.min((now - t0) / ms, 1);
      const e  = p < .5 ? 2*p*p : -1+(4-2*p)*p;
      el.setAttribute('transform', `translate(${sx+(tx-sx)*e},${sy+(ty-sy)*e})`);
      if (p < 1) rafIds.push(requestAnimationFrame(step));
      else res();
    }
    rafIds.push(requestAnimationFrame(step));
  });
}

/* radar pulse */
function startRadar(prefix) {
  const cx  = prefix==='L' ? 115  : 1058;
  const cy  = prefix==='L' ? 270  : 216;
  const ids = prefix==='L' ? ['rl1','rl2'] : ['rr1','rr2'];
  let idx = 0;
  function pulse() {
    if (cancelled) return;
    const ring = $(ids[idx % 2]);
    let r = 0, id;
    function grow() {
      if (cancelled) { clearInterval(id); return; }
      r += 2.5;
      ring.setAttribute('r', r);
      ring.setAttribute('opacity', Math.max(0, .8 - r/72));
      if (r >= 72) { clearInterval(id); ring.setAttribute('opacity',0); }
    }
    id = setInterval(grow, 25);
    timerIds.push(id);
    idx++;
  }
  const iv = setInterval(pulse, 650);
  timerIds.push(iv);
  return iv;
}

/* ─── phase bar ──────────────────────────────────────────── */
const PH = ['manage','track','deviate','normal','warn','response','after'];
function phSet(id, state) { // state: ''|'active'|'done'
  const el = $('ph-'+id);
  el.classList.remove('active','done');
  if (state) el.classList.add(state);
}
function phAll(state) { PH.forEach(id => phSet(id, state)); }

function setStatus(msg, cls='') {
  const el = $('ph-status');
  el.textContent = msg;
  el.className = 'ph-status' + (cls ? ' '+cls : '');
}

/* ─── flow bar ───────────────────────────────────────────── */
function flowReset() {
  ['fn-5ga','fn-ai','fn-asset','fn-res'].forEach(id => $( id).classList.remove('active'));
  ['as-jam','as-int','as-team','as-pol'].forEach(id => $(id).classList.remove('on'));
}
function flowOn(...ids) { ids.forEach(id => $(id).classList.add('active')); }
function assetOn(...ids) { ids.forEach(id => $(id).classList.add('on')); }

/* ─── reset ──────────────────────────────────────────────── */
function resetAll() {
  cancelled = true;
  timerIds.forEach(t => { clearTimeout(t); clearInterval(t); });
  rafIds.forEach(r => cancelAnimationFrame(r));
  timerIds = []; rafIds = [];

  setTimeout(() => {
    cancelled = false;
    running   = false;
    $('btn1').disabled = false;
    $('btn2').disabled = false;

    phAll('');
    flowReset();
    setStatus('시나리오를 선택하세요');

    setOpacity('drone-sim', 0);
    $('drone-sim').setAttribute('transform','translate(678,34)');
    droneColor('#38e69b');

    ['df1','df2','df3','ai-badge','alert-fac1'].forEach(id => setOpacity(id, 0));
    ['rl1','rl2','rr1','rr2'].forEach(id => { $( id).setAttribute('r',0); $( id).setAttribute('opacity',0); });

    $('fac1').setAttribute('fill','rgba(255,92,92,.14)');
    $('fac2').setAttribute('fill','rgba(255,92,92,.14)');
    $('fac1').setAttribute('stroke','rgba(255,92,92,.5)');
    $('fac2').setAttribute('stroke','rgba(255,92,92,.5)');
  }, 80);
}

/* ─── Scenario 1: 단순 촬영 → 정상 ─────────────────────── */
async function sc1() {
  // 관리
  phSet('manage','active');
  setStatus('등록 드론 확인 — 비행 관리 시작');
  setOpacity('drone-sim', 1);
  await wait(1200);

  // 추적
  phSet('manage','done'); phSet('track','active');
  setStatus('레이더 탐지 — 5G-A 데이터 수집 중');
  startRadar('L'); startRadar('R');
  await wait(400);
  setOpacity('df2', .7); flowOn('fn-5ga');
  await wait(400);
  setOpacity('df1', .55); setOpacity('df3', .55);

  // 드론이 도시 상공 순찰 (중요시설 접근 없음)
  await moveDrone(800, 32, 1000);
  if(cancelled)return;
  await moveDrone(530, 32, 1000);
  if(cancelled)return;
  await moveDrone(678, 32, 800);
  if(cancelled)return;

  // AI 판별
  setOpacity('ai-badge', 1); flowOn('fn-ai');
  setStatus('AI 의도 판별 중 — 비행 패턴 정상');
  await wait(1400);
  if(cancelled)return;
  setOpacity('ai-badge', 0);

  // 정상
  phSet('track','done'); phSet('normal','active');
  setStatus('✓ 정상 비행 판정 — 이상 없음', 'ok');
  await wait(1200);
  if(cancelled)return;

  // 복귀 & 사후관리
  await moveDrone(678, 34, 800);
  if(cancelled)return;
  phSet('normal','done'); phSet('after','active');
  setStatus('사후관리 — 비행 기록 저장 완료', 'ok');
  await wait(1000);
  if(cancelled)return;
  setOpacity('drone-sim', 0);
  setOpacity('df1',0); setOpacity('df2',0); setOpacity('df3',0);
  done();
}

/* ─── Scenario 2: 중요시설 접근 → 이탈 ─────────────────── */
async function sc2() {
  // 관리
  phSet('manage','active');
  setStatus('등록 드론 확인 — 비행 관리 시작');
  setOpacity('drone-sim', 1);
  await wait(1200);
  if(cancelled)return;

  // 추적
  phSet('manage','done'); phSet('track','active');
  setStatus('레이더 탐지 — 5G-A 데이터 수집 중');
  startRadar('L'); startRadar('R');
  await wait(400);
  setOpacity('df2',.7); flowOn('fn-5ga');
  await wait(400);
  setOpacity('df1',.55); setOpacity('df3',.55);

  // 드론이 중요시설 방향으로 접근
  await moveDrone(620, 60, 900);
  if(cancelled)return;
  await moveDrone(555, 108, 1000);
  if(cancelled)return;

  // 이탈 감지
  phSet('track','done'); phSet('deviate','active');
  setStatus('⚠ 비행 이탈 감지 — 중요시설 접근!', 'alert');
  droneColor('#f4b942');
  $('fac1').setAttribute('fill','rgba(255,92,92,.35)');
  $('fac1').setAttribute('stroke','rgba(255,92,92,.9)');
  setOpacity('alert-fac1', 1);
  await wait(1200);
  if(cancelled)return;

  // AI 판별
  setOpacity('ai-badge',1); flowOn('fn-ai');
  setStatus('AI 의도 분석 — 위협 패턴 감지');
  await wait(1400);
  if(cancelled)return;
  setOpacity('ai-badge',0);

  // 경고
  phSet('deviate','done'); phSet('warn','active');
  setStatus('⚠ 경고 발령 — 드론 복귀 명령 송신', 'alert');
  await wait(1200);
  if(cancelled)return;

  // 대응
  phSet('warn','done'); phSet('response','active');
  setStatus('대응 자산 투입 — 재밍·요격드론 출동', 'alert');
  droneColor('#ff5c5c');
  flowOn('fn-asset','fn-res');
  assetOn('as-jam','as-int');
  await wait(1000);
  if(cancelled)return;

  // 드론 제압
  setStatus('대응 완료 — 드론 무력화', 'alert');
  await wait(1200);
  if(cancelled)return;

  // 사후관리
  phSet('response','done'); phSet('after','active');
  setStatus('사후관리 — 사건 기록·분석 완료');
  await wait(1000);
  if(cancelled)return;
  setOpacity('drone-sim',0);
  setOpacity('df1',0); setOpacity('df2',0); setOpacity('df3',0);
  done();
}

function done() {
  running = false;
  $('btn1').disabled = false;
  $('btn2').disabled = false;
}

function run(n) {
  if (running) return;
  running = true;
  $('btn1').disabled = true;
  $('btn2').disabled = true;
  resetAll();
  setTimeout(() => { if(n===1) sc1(); else sc2(); }, 120);
}
</script>
</body>
</html>
