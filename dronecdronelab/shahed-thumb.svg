<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <defs>
    <radialGradient id="bg" cx="55%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#1d0a04"/>
      <stop offset="100%" stop-color="#060810"/>
    </radialGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sm" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="jet" x="-50%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="240" fill="url(#bg)"/>

  <!-- Tactical grid -->
  <g stroke="#ffffff" stroke-width="0.4" opacity="0.05">
    <line x1="50" y1="0" x2="50" y2="240"/><line x1="100" y1="0" x2="100" y2="240"/>
    <line x1="150" y1="0" x2="150" y2="240"/><line x1="200" y1="0" x2="200" y2="240"/>
    <line x1="250" y1="0" x2="250" y2="240"/><line x1="300" y1="0" x2="300" y2="240"/>
    <line x1="350" y1="0" x2="350" y2="240"/>
    <line x1="0" y1="40" x2="400" y2="40"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="120" x2="400" y2="120"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
  </g>

  <!-- High-speed streaks (jet speed indicator) -->
  <g stroke="#f97316" stroke-width="1.2" opacity="0.18">
    <line x1="308" y1="93"  x2="398" y2="88"/>
    <line x1="312" y1="106" x2="398" y2="103"/>
    <line x1="308" y1="134" x2="398" y2="137"/>
    <line x1="312" y1="147" x2="398" y2="152"/>
  </g>

  <!-- Radar rings (target, bottom-left) -->
  <circle cx="44" cy="198" r="36" fill="none" stroke="#4fa3ff" stroke-width="0.7" stroke-dasharray="3,4" opacity="0.2"/>
  <circle cx="44" cy="198" r="62" fill="none" stroke="#ff5c5c" stroke-width="0.7" stroke-dasharray="3,5" opacity="0.13"/>
  <circle cx="44" cy="198" r="5" fill="#ff5c5c" opacity="0.88"/>
  <line x1="44" y1="184" x2="44" y2="212" stroke="#ff5c5c" stroke-width="0.8" opacity="0.45"/>
  <line x1="30" y1="198" x2="58"  y2="198" stroke="#ff5c5c" stroke-width="0.8" opacity="0.45"/>
  <text x="44" y="175" text-anchor="middle" fill="#ff5c5c" font-family="'Courier New',monospace" font-size="8" opacity="0.65">TARGET</text>

  <!-- Attack flight path -->
  <path d="M 305,118 C 220,114 130,158 57,194" fill="none" stroke="#f97316" stroke-width="1.5" stroke-dasharray="8,5" opacity="0.35"/>

  <!-- JET EXHAUST PLUME (right of drone) -->
  <ellipse cx="322" cy="120" rx="32" ry="7"  fill="#fbbf24" filter="url(#jet)"  opacity="0.22"/>
  <ellipse cx="336" cy="120" rx="22" ry="5"  fill="#f97316" filter="url(#jet)"  opacity="0.18"/>
  <ellipse cx="350" cy="120" rx="14" ry="3"  fill="#fde68a" filter="url(#jet)"  opacity="0.12"/>

  <!-- Ghost swarm drones (right, V-formation) -->
  <g fill="#f97316">
    <g opacity="0.22" transform="translate(358,84)"><polygon points="-17,0 24,-13 24,13"/></g>
    <g opacity="0.17" transform="translate(380,98)"><polygon points="-14,0 20,-10 20,10"/></g>
    <g opacity="0.22" transform="translate(358,156)"><polygon points="-17,0 24,-13 24,13"/></g>
    <g opacity="0.17" transform="translate(380,142)"><polygon points="-14,0 20,-10 20,10"/></g>
    <g opacity="0.13" transform="translate(393,120)"><polygon points="-12,0 17,-9  17,9"/></g>
  </g>

  <!-- ── SHAHED-238 TOP-DOWN (nose left, jet engine rear) ── -->

  <!-- Wing ambient glow -->
  <polygon points="130,120 304,60 304,180" fill="#f97316" filter="url(#glow)" opacity="0.2"/>

  <!-- Delta wing (more swept than 136) -->
  <polygon points="130,120 304,60 304,180" fill="#b45309" opacity="0.92"/>
  <!-- Leading-edge highlight top -->
  <polygon points="130,120 304,60 304,86 208,118" fill="#f97316" opacity="0.56"/>
  <!-- Trailing shadow bottom -->
  <polygon points="130,120 304,180 304,154 208,122" fill="#78350f" opacity="0.52"/>

  <!-- Fuselage (thinner, more aerodynamic) -->
  <ellipse cx="222" cy="120" rx="92" ry="5" fill="#ea580c" filter="url(#sm)"/>
  <!-- Spine -->
  <line x1="138" y1="119.5" x2="302" y2="119.5" stroke="#fbbf24" stroke-width="0.8" opacity="0.38"/>

  <!-- Sharp nose cone (238 is more pointed) -->
  <polygon points="122,120 143,113 143,127" fill="#fef9c3"/>

  <!-- Canard fins (238 has small foreplanes) -->
  <polygon points="162,120 146,109 156,115" fill="#fde68a" opacity="0.72"/>
  <polygon points="162,120 146,131 156,125" fill="#fde68a" opacity="0.72"/>

  <!-- V-tail (sharper sweep) -->
  <polygon points="290,120 274,104 282,112" fill="#fcd34d" opacity="0.80"/>
  <polygon points="290,120 274,136 282,128" fill="#fcd34d" opacity="0.80"/>

  <!-- Jet engine nozzle (no propeller!) -->
  <ellipse cx="295" cy="120" rx="10" ry="7.5" fill="#1c1917" stroke="#f97316" stroke-width="1.8"/>
  <!-- Inner nozzle glow -->
  <ellipse cx="295" cy="120" rx="5"  ry="3.5" fill="#fbbf24" opacity="0.85"/>
  <!-- Immediate exhaust -->
  <ellipse cx="305" cy="120" rx="9"  ry="4"   fill="#fbbf24" filter="url(#sm)" opacity="0.7"/>

  <!-- Wing-tip lights -->
  <circle cx="304" cy="60"  r="2.8" fill="#fbbf24" opacity="0.9"/>
  <circle cx="304" cy="180" r="2.8" fill="#fbbf24" opacity="0.9"/>

  <!-- ── Labels / UI ── -->

  <!-- Title -->
  <text x="14" y="18" fill="#f97316" font-family="'Courier New',monospace" font-size="16" font-weight="bold" letter-spacing="1.5">SHAHED-238</text>
  <line x1="14" y1="24" x2="180" y2="24" stroke="#f97316" stroke-width="0.7" opacity="0.4"/>
  <text x="14" y="35" fill="#9ca3af" font-family="'Courier New',monospace" font-size="9" letter-spacing="0.4">드론 공격패턴 시뮬레이션</text>

  <!-- Swarm badge -->
  <rect x="14" y="42" width="78" height="17" rx="2" fill="rgba(249,115,22,0.14)" stroke="rgba(249,115,22,0.42)" stroke-width="1"/>
  <text x="53" y="54.5" text-anchor="middle" fill="#fb923c" font-family="'Courier New',monospace" font-size="9" font-weight="bold">× 10대  SWARM</text>

  <!-- Speed badge (top-right) — 500 km/h jet -->
  <rect x="316" y="9" width="72" height="33" rx="2" fill="rgba(249,115,22,0.12)" stroke="rgba(249,115,22,0.45)" stroke-width="1"/>
  <text x="352" y="22" text-anchor="middle" fill="#f97316" font-family="'Courier New',monospace" font-size="11" font-weight="bold">500 km/h</text>
  <text x="352" y="35" text-anchor="middle" fill="#6b7280" font-family="'Courier New',monospace" font-size="8">JET SPEED</text>

  <!-- Propulsion badge (distinguishes from 136) -->
  <rect x="316" y="48" width="72" height="16" rx="2" fill="rgba(251,191,36,0.1)" stroke="rgba(251,191,36,0.35)" stroke-width="1"/>
  <text x="352" y="60" text-anchor="middle" fill="#fbbf24" font-family="'Courier New',monospace" font-size="8" font-weight="bold">JET ENGINE</text>

  <!-- Threat level (bottom-right) -->
  <rect x="310" y="198" width="78" height="33" rx="2" fill="rgba(255,92,92,0.1)" stroke="rgba(255,92,92,0.38)" stroke-width="1"/>
  <text x="349" y="211" text-anchor="middle" fill="#ff5c5c" font-family="'Courier New',monospace" font-size="9" font-weight="bold">THREAT  HIGH</text>
  <text x="349" y="224" text-anchor="middle" fill="#6b7280" font-family="'Courier New',monospace" font-size="8">JET LOITERING</text>

  <!-- DcD LAB brand -->
  <text x="14" y="232" fill="#8b5cf6" font-family="serif" font-size="11" font-weight="bold" opacity="0.55">DcD</text>
  <text x="34" y="232" fill="#6b7280" font-family="'Courier New',monospace" font-size="8" opacity="0.55"> LAB SIM</text>
</svg>
